<head>
    <meta charset="UTF-8">

    <link href="7lab.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>


    <div class="panel">
        <div class="panel_icon">
            <img class="panel_icon_img" src="hat.svg">
            <span class="panel_icon_text">Foo</span>
        </div>

        <div class="panel_navigation">
            <a class="panel_navigation_pt">Home</a>
            <a class="panel_navigation_pt">Menu</a>
            <a class="panel_navigation_pt">Contact</a>
            <a class="panel_navigation_pt">Shop</a>
        </div>

        <div class="panel_search">
            <img class="panel_search_icon" src="lupa.svg">
            <input class="panel_searchbar" type="text" placeholder="Search">
            <img class="panel_basket_icon" src="kor.svg">

            <div class="panel_quantity">2</div>
        </div>
    </div>

    <div class="main">

        <div class="main_info">

            <div class="main_info_title_block">
                <div class="main_info_title">
                    <span class="main_info_title_string_main">Fast</span>
                    <span class="main_info_title_string_sub">Food<br>Delivery</span>
                </div>

                <div class="main_info_text">
                    Sed ut perspiciatis unde omnis iste natus sit<br>voluptatem accusantium doloremque laudantium
                </div>
            </div>

            <div class="main_info_buttons_rating_blocks">
                <div class="main_info_button">

                    <button class="main_info_button_order_now">Order Now</button>
                    <div class="watch_video">
                        <button class="main_info_button_watch_video"><img src="play.svg"></button>
                        <span class="main_info_button_text">Watch Video</span>
                    </div>
                </div>



                <div class="main_info_rating">
                    <img class="main_info_rating_img" src="stars.svg">
                    <span class="main_info_rating_text">5 star rating</span>
                    <span class="main_info_rating_reviews">based on 1788 reviews</span>
                </div>
            </div>
        </div>

        <div class="main_food">
            <img class="main_food_img" src="food.svg">
        </div>

    </div>

</body>
